# LedgerLoop CI/CD Pipeline
# 
# This workflow runs on every push and pull request:
#   - Type-checking (TypeScript strict)
#   - Linting (ESLint)
#   - Full test suite (138 tests, property-based + unit + accessibility)
#   - Production build verification
#
# Deployment steps are included but COMMENTED OUT until the Vercel project
# and Aurora DSQL cluster are provisioned. Uncomment when ready to deploy.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # CI: Type-check, lint, test, build
  # ─────────────────────────────────────────────────────────────────────────
  ci:
    name: Type-check, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (TypeScript strict)
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests (property-based + unit + accessibility)
        run: npm test

      - name: Production build
        run: npm run build

